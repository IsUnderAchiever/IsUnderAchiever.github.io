    <h1 id="时间戳解析问题"><a href="#时间戳解析问题" class="headerlink" title="时间戳解析问题"></a>时间戳解析问题</h1><blockquote>
<p>最近遇到个问题</p>
<p>后端传递时间戳后，前端无法解析</p>
<p>怎么一回事呢？</p>
<p>先说结论，将时间戳从<code>字符串</code>转为<code>整形</code></p>
</blockquote>
<figure class="highlight javascript"><table><tr><td class="code"><pre><code class="hljs javascript"><span class="hljs-keyword">const</span> <span class="hljs-title function_">parseDate</span> = (<span class="hljs-params"></span>) =&gt; &#123;<br>  <span class="hljs-keyword">let</span> timestamp = <span class="hljs-string">&#x27;1695040213980&#x27;</span>;<br>  <span class="hljs-keyword">let</span> date = <span class="hljs-keyword">new</span> <span class="hljs-title class_">Date</span>(timestamp);<br>  <span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(<span class="hljs-string">&#x27;date:&#x27;</span>, date);<br>  <span class="hljs-keyword">let</span> year = date.<span class="hljs-title function_">getFullYear</span>();<br>  <span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(<span class="hljs-string">&#x27;year:&#x27;</span>, year);<br>&#125;<br></code></pre></td></tr></table></figure>

<p><img onerror="imgOnError(this);" data-fancybox="gallery" src="https://raw.githubusercontent.com/IsUnderAchiever/blog-img/master/img/202309182044051.png" alt="image-20230918204447925" data-caption="image-20230918204447925" loading="lazy"></p>
<blockquote>
<p>后来查了一些博客，发现写法中的问题</p>
<p>改为如下写法即可</p>
</blockquote>
<figure class="highlight javascript"><table><tr><td class="code"><pre><code class="hljs javascript"><span class="hljs-keyword">const</span> <span class="hljs-title function_">parseDate</span> = (<span class="hljs-params"></span>) =&gt; &#123;<br>  <span class="hljs-keyword">let</span> timestamp = <span class="hljs-number">1695040213980</span>;<br>  <span class="hljs-keyword">let</span> date = <span class="hljs-keyword">new</span> <span class="hljs-title class_">Date</span>(timestamp);<br>  <span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(<span class="hljs-string">&#x27;date:&#x27;</span>, date);<br>  <span class="hljs-keyword">let</span> year = date.<span class="hljs-title function_">getFullYear</span>();<br>  <span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(<span class="hljs-string">&#x27;year:&#x27;</span>, year);<br>&#125;<br></code></pre></td></tr></table></figure>

<p><img onerror="imgOnError(this);" data-fancybox="gallery" src="https://raw.githubusercontent.com/IsUnderAchiever/blog-img/master/img/202309182045402.png" alt="image-20230918204547297" data-caption="image-20230918204547297" loading="lazy"></p>
